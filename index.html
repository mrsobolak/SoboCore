<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daisy Bell</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    font-family: 'Tahoma', 'Arial', sans-serif;
  }
  #btn {
    padding: 12px 36px;
    font-size: 18px;
    font-family: inherit;
    background: #c0c0c0;
    border: 2px outset #fff;
    cursor: pointer;
  }
  #btn:active { border-style: inset; }
</style>
</head>
<body>
<button id="btn" onclick="start()">Hello</button>
<script>
// Daisy Bell chorus - Key of C, 3/4 waltz
// Melody from kalimba letter notes + piano sheet (corrected: opens G E C)
// [note, beats]
var MELODY = [
  // "Dai-  sy,     Dai-  sy,"
  ['G4',3], ['E4',3], ['C4',3], ['G4',3],
  // "give  me  your  an-  swer  do."
  ['E4',1], ['G4',1], ['G4',1], ['E4',1], ['G4',1], ['D4',1], ['R',6],
  // "I'm   half    cra-  zy,"
  ['D4',1.5], ['C5',1.5], ['A4',1.5], ['F4',1.5],
  // "all for the love of  you."
  ['C4',1], ['D4',1], ['E4',1], ['F4',1], ['G4',1], ['F4',1], ['R',6],
  // "It  won't be  a   sty- lish  mar-     riage,"
  ['G4',1],['C5',1],['G4',1], ['A4',1],['B4',1],['A4',1], ['G4',3], ['E4',3],
  // "I   can't af- ford a   car-  riage,"
  ['G4',1],['A4',1],['G4',1], ['F4',1],['G4',1],['F4',1], ['E4',3], ['R',3],
  // "but  you'll look sweet,  up-  on   the  seat"
  ['C4',1],['E4',1],['G4',1], ['F4',3], ['C4',1],['E4',1],['G4',1], ['F4',3],
  // "of   a   bi-  cy-  cle  built for  two."
  ['A4',1],['B4',1],['C5',1], ['A4',1],['F4',1],['G4',1], ['E4',2],['C4',4]
];

var NOTES = {
  'C4':261.63,'D4':293.66,'E4':329.63,'F4':349.23,
  'G4':392.00,'A4':440.00,'B4':493.88,'C5':523.25,'R':0
};

// IBM 7094 style: slow, robotic, vocoder-like
var BPM = 80;
var BEAT = 60 / BPM;
var ctx, mg;

function start() {
  document.getElementById('btn').style.display = 'none';
  ctx = new (window.AudioContext || window.webkitAudioContext)();

  // Master gain
  mg = ctx.createGain();
  mg.gain.value = 0.18;

  // Vocoder-style filter chain:
  // Narrow bandpass to simulate vocal tract resonance
  var f1 = ctx.createBiquadFilter();
  f1.type = 'bandpass'; f1.frequency.value = 800; f1.Q.value = 2;

  // Second formant
  var f2 = ctx.createBiquadFilter();
  f2.type = 'peaking'; f2.frequency.value = 1400; f2.gain.value = 8; f2.Q.value = 2;

  // Harsh low-pass to kill highs like old DAC
  var lp = ctx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 3000;

  // High-pass to thin it out like a telephone
  var hp = ctx.createBiquadFilter();
  hp.type = 'highpass'; hp.frequency.value = 200;

  mg.connect(f1);
  f1.connect(f2);
  f2.connect(lp);
  lp.connect(hp);
  hp.connect(ctx.destination);

  // 60Hz mains hum (IBM mainframe room)
  var hum = ctx.createOscillator();
  hum.type = 'sine';
  hum.frequency.value = 60;
  var humGain = ctx.createGain();
  humGain.gain.value = 0.012;
  hum.connect(humGain);
  humGain.connect(ctx.destination);
  hum.start();

  // Tape hiss
  var buf = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
  var d = buf.getChannelData(0);
  for (var i = 0; i < d.length; i++)
    d[i] = (Math.random() - 0.5) * 0.015;
  var noise = ctx.createBufferSource();
  noise.buffer = buf; noise.loop = true;
  var noiseGain = ctx.createGain();
  noiseGain.gain.value = 0.3;
  var noiseFilt = ctx.createBiquadFilter();
  noiseFilt.type = 'bandpass';
  noiseFilt.frequency.value = 2000;
  noiseFilt.Q.value = 0.3;
  noise.connect(noiseGain);
  noiseGain.connect(noiseFilt);
  noiseFilt.connect(ctx.destination);
  noise.start();

  loop();
}

function playNote(freq, t, dur) {
  if (freq === 0) return;

  // IBM vocoder source: sawtooth (rich harmonics like vocal cord buzz)
  var saw = ctx.createOscillator();
  saw.type = 'sawtooth';
  saw.frequency.value = freq;

  // Second detuned sawtooth for thickness
  var saw2 = ctx.createOscillator();
  saw2.type = 'sawtooth';
  saw2.frequency.value = freq * 1.002; // very slight detune

  // Sub oscillator (square, one octave down) for body
  var sub = ctx.createOscillator();
  sub.type = 'square';
  sub.frequency.value = freq / 2;
  var subGain = ctx.createGain();
  subGain.gain.value = 0.08;

  // Mix
  var mix = ctx.createGain();
  mix.gain.value = 0.5;

  // Envelope: flat and robotic, minimal attack/release
  var env = ctx.createGain();
  env.gain.setValueAtTime(0, t);
  env.gain.linearRampToValueAtTime(0.6, t + 0.01); // instant attack
  env.gain.setValueAtTime(0.6, t + dur - 0.02);
  env.gain.linearRampToValueAtTime(0, t + dur);

  // Slow wobble (unstable early synthesis)
  var lfo = ctx.createOscillator();
  lfo.frequency.value = 3 + Math.random() * 0.5;
  var lfoGain = ctx.createGain();
  lfoGain.gain.value = 1.5; // subtle pitch drift
  lfo.connect(lfoGain);
  lfoGain.connect(saw.frequency);
  lfoGain.connect(saw2.frequency);

  saw.connect(mix);
  saw2.connect(mix);
  sub.connect(subGain);
  subGain.connect(mix);
  mix.connect(env);
  env.connect(mg);

  saw.start(t); saw2.start(t); sub.start(t); lfo.start(t);
  saw.stop(t + dur + 0.01);
  saw2.stop(t + dur + 0.01);
  sub.stop(t + dur + 0.01);
  lfo.stop(t + dur + 0.01);
}

function scheduleVerse(t) {
  for (var i = 0; i < MELODY.length; i++) {
    var dur = MELODY[i][1] * BEAT;
    playNote(NOTES[MELODY[i][0]], t, dur * 0.92);
    t += dur;
  }
  return t;
}

function loop() {
  var total = 0;
  for (var i = 0; i < MELODY.length; i++) total += MELODY[i][1];
  total *= BEAT;
  scheduleVerse(ctx.currentTime + 0.1);
  setTimeout(loop, (total + 3) * 1000);
}
</script>
</body>
</html>
