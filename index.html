<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daisy Bell</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    font-family: 'Tahoma', 'Arial', sans-serif;
  }
  #btn {
    padding: 12px 36px;
    font-size: 18px;
    font-family: inherit;
    background: #c0c0c0;
    border: 2px outset #fff;
    cursor: pointer;
  }
  #btn:active { border-style: inset; }
</style>
</head>
<body>
<button id="btn" onclick="start()">Hello</button>
<script>
var PITCH = [
  74,71,67,62, 64,66,67,64,67,62,
  69,74,71,67, 64,66,67,69,71,69,
  71,72,71,69, 74,71,69,67, 69,71,67,64, 67,64,62,
  62,67,71,69, 67,71,69,71, 72,74,71,67, 69,62,67
];
var DUR = [
  3,3,3,3, 1,1,1,2,1,6,
  3,3,3,3, 1,1,1,2,1,6,
  1,1,1,1, 2,1,1,4, 1,2,1,2, 1,1,5,
  1,2,1,2, 2,1,1,1, 1,1,1,1, 2,1,5
];

// Waltz chords: [bass MIDI, chord1 MIDI, chord2 MIDI, duration in quarters]
var CHORDS = [
  [50,66,71, 6],[55,59,67, 6],
  [52,57,64, 3],[55,59,67, 3],[55,59,62, 6],
  [57,62,69, 6],[52,55,64, 6],
  [50,57,62, 3],[55,59,67, 3],[50,55,62, 6],
  [52,57,64, 6],[55,59,67, 6],
  [50,57,62, 6],[55,59,62, 6],
  [57,62,69, 4],[50,55,62, 4],[55,59,67, 4],
  [50,57,62, 3],[55,59,62, 3],[55,59,67, 2],[50,55,62, 5],
];

function mtf(m) { return 440 * Math.pow(2, (m - 69) / 12); }

var ctx, masterGain;
var loopCount = 0;

function asc() {
  var t = Math.min(loopCount, 12);
  var p = t / 12;
  return {
    bpm: 105 - p * 30,
    ps: p * 3,
    rev: 0.15 + p * 0.35,
    bright: 2500 + p * 3000,
    shim: p * 0.05,
    atk: 0.01 + p * 0.03,
  };
}

async function goFull() {
  try {
    var el = document.documentElement;
    if (el.requestFullscreen) await el.requestFullscreen();
    else if (el.webkitRequestFullscreen) await el.webkitRequestFullscreen();
  } catch(e) {}
  try {
    if ('wakeLock' in navigator) {
      var wl = await navigator.wakeLock.request('screen');
      document.addEventListener('visibilitychange', async function() {
        if (document.visibilityState === 'visible') {
          try { wl = await navigator.wakeLock.request('screen'); } catch(e) {}
        }
      });
    }
  } catch(e) {}
}

var revGain, dryGain, brightF, convNode;

function start() {
  document.getElementById('btn').style.display = 'none';
  goFull();

  ctx = new (window.AudioContext || window.webkitAudioContext)();
  ctx.resume();

  masterGain = ctx.createGain();
  masterGain.gain.value = 0.22;

  // Simple delay-based reverb instead of convolver (lighter on mobile)
  var delay1 = ctx.createDelay(); delay1.delayTime.value = 0.12;
  var delay2 = ctx.createDelay(); delay2.delayTime.value = 0.23;
  var delay3 = ctx.createDelay(); delay3.delayTime.value = 0.37;
  var fb1 = ctx.createGain(); fb1.gain.value = 0.3;
  var fb2 = ctx.createGain(); fb2.gain.value = 0.25;
  var fb3 = ctx.createGain(); fb3.gain.value = 0.2;
  delay1.connect(fb1); fb1.connect(delay1);
  delay2.connect(fb2); fb2.connect(delay2);
  delay3.connect(fb3); fb3.connect(delay3);

  revGain = ctx.createGain(); revGain.gain.value = 0.15;
  dryGain = ctx.createGain(); dryGain.gain.value = 0.85;

  brightF = ctx.createBiquadFilter();
  brightF.type = 'lowpass'; brightF.frequency.value = 2500;

  masterGain.connect(brightF);
  brightF.connect(dryGain);
  brightF.connect(delay1);
  brightF.connect(delay2);
  brightF.connect(delay3);
  delay1.connect(revGain);
  delay2.connect(revGain);
  delay3.connect(revGain);
  dryGain.connect(ctx.destination);
  revGain.connect(ctx.destination);

  loop();
}

function tone(freq, t, dur, type, vol, dest) {
  var o = ctx.createOscillator();
  o.type = type;
  o.frequency.value = freq;
  var g = ctx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.015);
  g.gain.setValueAtTime(vol, t + Math.max(dur - 0.04, 0.02));
  g.gain.linearRampToValueAtTime(0, t + dur);
  o.connect(g); g.connect(dest);
  o.start(t); o.stop(t + dur + 0.02);
}

function scheduleMelody(t0, a) {
  var q = 60 / a.bpm;
  var t = t0;
  for (var i = 0; i < PITCH.length; i++) {
    var dur = DUR[i] * q;
    var f = mtf(PITCH[i] + a.ps);
    // Main melody: sine
    tone(f, t, dur * 0.9, 'sine', 0.35, masterGain);
    // Warmth: quiet triangle
    tone(f, t, dur * 0.9, 'triangle', 0.08, masterGain);
    // Shimmer: octave up sine (grows)
    if (a.shim > 0.01) {
      tone(f * 2, t, dur * 0.9, 'sine', a.shim, masterGain);
    }
    t += dur;
  }
}

function scheduleAccomp(t0, a) {
  var q = 60 / a.bpm;
  var t = t0;
  for (var i = 0; i < CHORDS.length; i++) {
    var c = CHORDS[i];
    var bassF = mtf(c[0] + a.ps);
    var c1f = mtf(c[1] + a.ps);
    var c2f = mtf(c[2] + a.ps);
    var beats = c[3];

    var pos = t;
    var left = beats;
    while (left >= 3) {
      // Beat 1: bass (sine, warm)
      tone(bassF, pos, q * 1.8, 'sine', 0.18, masterGain);
      // Beat 2: chord (triangle, soft)
      tone(c1f, pos + q, q * 0.6, 'triangle', 0.08, masterGain);
      tone(c2f, pos + q, q * 0.6, 'triangle', 0.08, masterGain);
      // Beat 3: chord (triangle, softer)
      tone(c1f, pos + q * 2, q * 0.6, 'triangle', 0.06, masterGain);
      tone(c2f, pos + q * 2, q * 0.6, 'triangle', 0.06, masterGain);
      pos += q * 3;
      left -= 3;
    }
    // Handle leftover beats
    if (left >= 1) {
      tone(bassF, pos, q * Math.min(left, 1.8), 'sine', 0.18, masterGain);
    }
    t += beats * q;
  }
}

function loop() {
  ctx.resume();
  var a = asc();

  brightF.frequency.setTargetAtTime(a.bright, ctx.currentTime, 1);
  revGain.gain.setTargetAtTime(a.rev, ctx.currentTime, 1);
  dryGain.gain.setTargetAtTime(1 - a.rev * 0.4, ctx.currentTime, 1);

  var q = 60 / a.bpm;
  var total = 0;
  for (var i = 0; i < DUR.length; i++) total += DUR[i];
  total *= q;

  var t0 = ctx.currentTime + 0.15;
  scheduleMelody(t0, a);
  scheduleAccomp(t0, a);

  loopCount++;
  setTimeout(loop, (total + 3) * 1000);
}
</script>
</body>
</html>
