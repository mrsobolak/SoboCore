<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daisy Bell</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    font-family: 'Tahoma', 'Arial', sans-serif;
  }
  #btn {
    padding: 12px 36px;
    font-size: 18px;
    font-family: inherit;
    background: #c0c0c0;
    border: 2px outset #fff;
    cursor: pointer;
  }
  #btn:active { border-style: inset; }
</style>
</head>
<body>
<button id="btn" onclick="start()">Hello</button>
<script>
var MELODY = [
  ['E4',3],['C4',3],['E4',3],['C4',3],
  ['D4',1],['E4',1],['F4',1],['E4',2],['D4',1],['C4',3],['R',3],
  ['E4',1.5],['E4',1.5],['F4',1.5],['F4',1.5],
  ['E4',1],['F4',1],['G4',1],['F4',2],['E4',1],['D4',3],['R',3],
  ['G4',1],['A4',1],['G4',1],['F4',1],['E4',1],['F4',1],['G4',3],['E4',3],
  ['A4',1],['B4',1],['A4',1],['G4',1],['F4',1],['G4',1],['A4',3],['F4',3],
  ['B4',1],['C5',1],['B4',1],['A4',3],['G4',1],['A4',1],['B4',1],['C5',3],
  ['B4',1],['A4',1],['G4',1],['A4',1],['F4',1],['E4',1],['D4',2],['C4',4]
];

var NOTES = {
  'C4':261.63,'D4':293.66,'E4':329.63,'F4':349.23,'G4':392.00,
  'A4':440.00,'B4':493.88,'C5':523.25,'R':0
};

var BPM = 88;
var BEAT = 60 / BPM;
var ctx, mg;

function start() {
  document.getElementById('btn').style.display = 'none';

  ctx = new (window.AudioContext || window.webkitAudioContext)();
  mg = ctx.createGain();
  mg.gain.value = 0.3;

  var bp = ctx.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 1100; bp.Q.value = 0.6;
  var lp = ctx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 2400;
  var hp = ctx.createBiquadFilter();
  hp.type = 'highpass'; hp.frequency.value = 250;

  mg.connect(bp); bp.connect(lp); lp.connect(hp); hp.connect(ctx.destination);

  var buf = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
  var d = buf.getChannelData(0);
  for (var i = 0; i < d.length; i++)
    d[i] = Math.random() < 0.002 ? (Math.random() - 0.5) * 1.2 : (Math.random() - 0.5) * 0.01;
  var cn = ctx.createBufferSource(); cn.buffer = buf; cn.loop = true;
  var cg = ctx.createGain(); cg.gain.value = 0.15;
  cn.connect(cg); cg.connect(ctx.destination); cn.start();

  loop();
}

function playNote(freq, t, dur) {
  if (freq === 0) return;
  var o = ctx.createOscillator();
  o.type = 'triangle';
  o.frequency.value = freq;
  o.detune.value = (Math.random() - 0.5) * 12;

  var o2 = ctx.createOscillator();
  o2.type = 'square';
  o2.frequency.value = freq;
  o2.detune.value = 6;
  var o2g = ctx.createGain(); o2g.gain.value = 0.04;

  var env = ctx.createGain();
  env.gain.setValueAtTime(0, t);
  env.gain.linearRampToValueAtTime(0.45, t + 0.03);
  env.gain.setValueAtTime(0.45, t + dur - 0.05);
  env.gain.linearRampToValueAtTime(0, t + dur);

  var lfo = ctx.createOscillator();
  lfo.frequency.value = 4 + Math.random();
  var lg = ctx.createGain(); lg.gain.value = 2.5;
  lfo.connect(lg); lg.connect(o.frequency); lg.connect(o2.frequency);

  o.connect(env); o2.connect(o2g); o2g.connect(env); env.connect(mg);
  o.start(t); o2.start(t); lfo.start(t);
  o.stop(t + dur + 0.01); o2.stop(t + dur + 0.01); lfo.stop(t + dur + 0.01);
}

function scheduleVerse(t) {
  for (var i = 0; i < MELODY.length; i++) {
    var dur = MELODY[i][1] * BEAT;
    playNote(NOTES[MELODY[i][0]], t, dur * 0.9);
    t += dur;
  }
  return t;
}

function loop() {
  var total = 0;
  for (var i = 0; i < MELODY.length; i++) total += MELODY[i][1];
  total *= BEAT;
  scheduleVerse(ctx.currentTime + 0.1);
  setTimeout(loop, (total + 2.5) * 1000);
}
</script>
</body>
</html>
