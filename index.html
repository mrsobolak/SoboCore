<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daisy Bell</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    font-family: 'Tahoma', 'Arial', sans-serif;
  }
  #btn {
    padding: 12px 36px;
    font-size: 18px;
    font-family: inherit;
    background: #c0c0c0;
    border: 2px outset #fff;
    cursor: pointer;
  }
  #btn:active {
    border-style: inset;
  }
  #btn.playing {
    border-style: inset;
    color: #808080;
  }
</style>
</head>
<body>
<button id="btn" onclick="start()">Hello</button>
<script>
const MELODY=[['F4',2],['D4',2],['Bb3',1],['D4',1],['F4',2],['D4',2],['Bb3',2],['G4',2],['F4',2],['D4',1],['F4',1],['G4',2],['F4',2],['D4',2],['Bb4',2],['A4',1],['Bb4',1],['C5',2],['A4',2],['F4',2],['Bb4',2],['A4',1],['Bb4',1],['C5',2],['Bb4',2],['G4',2],['A4',1.5],['Bb4',.5],['C5',2],['D5',2],['Bb4',2],['G4',2],['F4',2],['Bb4',1],['A4',1],['G4',1],['F4',1],['D4',1],['Bb3',1],['C4',2],['Bb3',4]];
const N={'Bb3':233.08,'C4':261.63,'D4':293.66,'F4':349.23,'G4':392,'A4':440,'Bb4':466.16,'C5':523.25,'D5':587.33};
const BPM=100,BEAT=60/BPM;
let ctx,mg,started=false;

function start(){
  if(started)return;
  started=true;
  document.getElementById('btn').textContent='Playing...';
  document.getElementById('btn').classList.add('playing');

  ctx=new(window.AudioContext||window.webkitAudioContext)();
  mg=ctx.createGain();mg.gain.value=.3;

  var bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=900;bp.Q.value=.7;
  var lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=2200;
  var hp=ctx.createBiquadFilter();hp.type='highpass';hp.frequency.value=300;
  var ws=ctx.createWaveShaper();var c=new Float32Array(256);
  for(var i=0;i<256;i++){var x=i/128-1;c[i]=Math.PI*x/(Math.PI+3*Math.abs(x));}ws.curve=c;
  mg.connect(bp);bp.connect(ws);ws.connect(lp);lp.connect(hp);hp.connect(ctx.destination);

  var buf=ctx.createBuffer(1,ctx.sampleRate*2,ctx.sampleRate),d=buf.getChannelData(0);
  for(var i=0;i<d.length;i++)d[i]=Math.random()<.003?(Math.random()-.5)*1.4:(Math.random()-.5)*.012;
  var cn=ctx.createBufferSource();cn.buffer=buf;cn.loop=true;
  var cg=ctx.createGain();cg.gain.value=.2;cn.connect(cg);cg.connect(ctx.destination);cn.start();

  loop();
}

function playNote(f,t,dur){
  var o1=ctx.createOscillator();o1.type='triangle';o1.frequency.value=f;o1.detune.value=(Math.random()-.5)*18;
  var o2=ctx.createOscillator();o2.type='square';o2.frequency.value=f;o2.detune.value=8;
  var o2g=ctx.createGain();o2g.gain.value=.06;
  var env=ctx.createGain();env.gain.setValueAtTime(0,t);env.gain.linearRampToValueAtTime(.5,t+.04);
  env.gain.setValueAtTime(.5,t+dur-.06);env.gain.linearRampToValueAtTime(0,t+dur);
  var lfo=ctx.createOscillator();lfo.frequency.value=4.5+Math.random()*1.5;
  var lg=ctx.createGain();lg.gain.value=3;lfo.connect(lg);lg.connect(o1.frequency);lg.connect(o2.frequency);
  o1.connect(env);o2.connect(o2g);o2g.connect(env);env.connect(mg);
  o1.start(t);o2.start(t);lfo.start(t);o1.stop(t+dur+.01);o2.stop(t+dur+.01);lfo.stop(t+dur+.01);
}

function scheduleVerse(t){MELODY.forEach(function(m){var dur=m[1]*BEAT;playNote(N[m[0]],t,dur*.92);t+=dur;});return t;}

function loop(){
  var total=MELODY.reduce(function(s,m){return s+m[1];},0)*BEAT;
  scheduleVerse(ctx.currentTime+.1);
  setTimeout(loop,(total+2.5)*1000);
}
</script>
</body>
</html>
