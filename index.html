<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daisy Bell</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    font-family: 'Tahoma', 'Arial', sans-serif;
  }
  #btn {
    padding: 12px 36px;
    font-size: 18px;
    font-family: inherit;
    background: #c0c0c0;
    border: 2px outset #fff;
    cursor: pointer;
  }
  #btn:active { border-style: inset; }
</style>
</head>
<body>
<button id="btn" onclick="start()">Hello</button>
<script>
// Exact Daisy Bell score from github.com/ayoungblood/daisy-bell
// MIDI note numbers and quarter-note durations
var PITCH = [
  74, 71, 67, 62, 64, 66, 67, 64, 67, 62,
  69, 74, 71, 67, 64, 66, 67, 69, 71, 69,
  71, 72, 71, 69, 74, 71, 69, 67, 69, 71, 67, 64, 67, 64, 62,
  62, 67, 71, 69, 67, 71, 69, 71, 72, 74, 71, 67, 69, 62, 67
];
var DUR = [
  3,  3,  3,  3,  1,  1,  1,  2,  1,  6,
  3,  3,  3,  3,  1,  1,  1,  2,  1,  6,
  1,  1,  1,  1,  2,  1,  1,  4,  1,  2,  1,  2,  1,  1,  5,
  1,  2,  1,  2,  2,  1,  1,  1,  1,  1,  1,  1,  2,  1,  5
];

function midiToFreq(m) { return 440 * Math.pow(2, (m - 69) / 12); }

var BPM = 120;
var QUARTER = 60 / BPM;
var ctx, mg;

function start() {
  document.getElementById('btn').style.display = 'none';
  ctx = new (window.AudioContext || window.webkitAudioContext)();

  mg = ctx.createGain();
  mg.gain.value = 0.18;

  // IBM vocoder-style filter chain
  var f1 = ctx.createBiquadFilter();
  f1.type = 'bandpass'; f1.frequency.value = 800; f1.Q.value = 2;
  var f2 = ctx.createBiquadFilter();
  f2.type = 'peaking'; f2.frequency.value = 1400; f2.gain.value = 8; f2.Q.value = 2;
  var lp = ctx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 3000;
  var hp = ctx.createBiquadFilter();
  hp.type = 'highpass'; hp.frequency.value = 200;

  mg.connect(f1); f1.connect(f2); f2.connect(lp); lp.connect(hp); hp.connect(ctx.destination);

  // 60Hz mains hum
  var hum = ctx.createOscillator();
  hum.type = 'sine'; hum.frequency.value = 60;
  var humG = ctx.createGain(); humG.gain.value = 0.01;
  hum.connect(humG); humG.connect(ctx.destination); hum.start();

  // Tape hiss
  var buf = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
  var d = buf.getChannelData(0);
  for (var i = 0; i < d.length; i++)
    d[i] = (Math.random() - 0.5) * 0.012;
  var noise = ctx.createBufferSource();
  noise.buffer = buf; noise.loop = true;
  var nG = ctx.createGain(); nG.gain.value = 0.25;
  var nF = ctx.createBiquadFilter();
  nF.type = 'bandpass'; nF.frequency.value = 2000; nF.Q.value = 0.3;
  noise.connect(nG); nG.connect(nF); nF.connect(ctx.destination); noise.start();

  loop();
}

function playNote(freq, t, dur) {
  var saw = ctx.createOscillator();
  saw.type = 'sawtooth'; saw.frequency.value = freq;
  var saw2 = ctx.createOscillator();
  saw2.type = 'sawtooth'; saw2.frequency.value = freq * 1.002;
  var sub = ctx.createOscillator();
  sub.type = 'square'; sub.frequency.value = freq / 2;
  var subG = ctx.createGain(); subG.gain.value = 0.07;

  var mix = ctx.createGain(); mix.gain.value = 0.5;
  var env = ctx.createGain();
  env.gain.setValueAtTime(0, t);
  env.gain.linearRampToValueAtTime(0.6, t + 0.01);
  env.gain.setValueAtTime(0.6, t + dur - 0.02);
  env.gain.linearRampToValueAtTime(0, t + dur);

  var lfo = ctx.createOscillator();
  lfo.frequency.value = 3 + Math.random() * 0.5;
  var lfoG = ctx.createGain(); lfoG.gain.value = 1.5;
  lfo.connect(lfoG); lfoG.connect(saw.frequency); lfoG.connect(saw2.frequency);

  saw.connect(mix); saw2.connect(mix);
  sub.connect(subG); subG.connect(mix);
  mix.connect(env); env.connect(mg);

  saw.start(t); saw2.start(t); sub.start(t); lfo.start(t);
  saw.stop(t + dur + 0.01); saw2.stop(t + dur + 0.01);
  sub.stop(t + dur + 0.01); lfo.stop(t + dur + 0.01);
}

function scheduleVerse(t) {
  for (var i = 0; i < PITCH.length; i++) {
    var dur = DUR[i] * QUARTER;
    playNote(midiToFreq(PITCH[i]), t, dur * 0.92);
    t += dur;
  }
  return t;
}

function loop() {
  var total = 0;
  for (var i = 0; i < DUR.length; i++) total += DUR[i];
  total *= QUARTER;
  scheduleVerse(ctx.currentTime + 0.1);
  setTimeout(loop, (total + 3) * 1000);
}
</script>
</body>
</html>
